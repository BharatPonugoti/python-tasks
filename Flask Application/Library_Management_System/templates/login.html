<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saraswathi Smart Library</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),

            url("https://wallpapercave.com/wp/wp2704824.jpg");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        .login-container{

            width:420px;

            padding:40px;

            border-radius:25px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(15px);

            text-align:center;

            color:white;

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:
            0 0 25px rgba(0,0,0,0.5),
            0 0 40px rgba(147,51,234,0.4);

            animation:popup 1s ease;
        }

        @keyframes popup{

            from{
                transform:scale(0.7);
                opacity:0;
            }

            to{
                transform:scale(1);
                opacity:1;
            }
        }

        .logo{

            width:90px;

            margin-bottom:15px;
        }

        h1{

            font-size:42px;

            margin-bottom:10px;

            color:white;

            text-shadow:2px 2px 10px black;
        }

        .tagline{

            color:#facc15;

            font-size:18px;

            margin-bottom:30px;

            font-weight:bold;
        }

        .input-box{

            margin-bottom:20px;
        }

        .input-box input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            outline:none;

            background:rgba(255,255,255,0.2);

            color:white;

            font-size:16px;
        }

        .input-box input::placeholder{

            color:#eee;
        }

        .login-btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            color:white;

            cursor:pointer;

            background:linear-gradient(
                90deg,
                #3b82f6,
                #9333ea
            );

            transition:0.3s;
        }

        .login-btn:hover{

            transform:scale(1.05);

            box-shadow:
            0 0 15px #3b82f6,
            0 0 30px #9333ea;
        }

        .footer{

            margin-top:20px;

            font-size:14px;

            color:#ddd;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png"
             class="logo">

        <h1>📚 Admin Login</h1>

        <div class="tagline">
            Saraswathi Smart Library Management System
        </div>

        <form method="POST">

            <div class="input-box">

                <input type="text"
                       name="username"
                       placeholder="Enter Username">

            </div>

            <div class="input-box">

                <input type="password"
                       name="password"
                       placeholder="Enter Password">

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <p class="footer">
            © 2026 Library Management System
        </p>

    </div>

</body>

</html>
