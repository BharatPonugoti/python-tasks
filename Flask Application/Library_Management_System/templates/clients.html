<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Clients Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            padding:40px;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #7c3aed
            );

            color:white;
        }

        .container{

            background:rgba(255,255,255,0.1);

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:
            0 0 25px rgba(0,0,0,0.4);
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            font-size:45px;
        }

        .top-section{

            display:flex;

            justify-content:space-between;

            margin-bottom:25px;
        }

        .add-btn{

            padding:12px 25px;

            border:none;

            border-radius:10px;

            background:#22c55e;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        .add-btn:hover{

            transform:scale(1.05);

            background:#16a34a;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:15px;
        }

        th{

            background:#2563eb;

            padding:15px;

            font-size:18px;
        }

        td{

            background:rgba(255,255,255,0.1);

            padding:15px;

            text-align:center;

            font-size:17px;
        }

        tr:hover td{

            background:rgba(255,255,255,0.2);
        }

        .paid{

            color:#22c55e;

            font-weight:bold;
        }

        .not-paid{

            color:#ef4444;

            font-weight:bold;
        }

        .delete-btn{

            padding:8px 15px;

            border:none;

            border-radius:8px;

            background:#ef4444;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .delete-btn:hover{

            background:#dc2626;

            transform:scale(1.05);
        }

        .popup{

            display:none;

            position:fixed;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            background:white;

            color:black;

            padding:30px;

            border-radius:20px;

            width:350px;

            box-shadow:
            0 0 20px rgba(0,0,0,0.5);
        }

        .popup input,
        .popup select{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:1px solid gray;

            border-radius:8px;
        }

        .save-btn{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>👨‍🎓 Clients Details</h1>

        <div class="top-section">

            <button class="add-btn"
                    onclick="openPopup()">

                ➕ Add Client

            </button>

        </div>

        <table id="clientTable">

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Premium Status</th>
                <th>Action</th>

            </tr>

            <tr>

                <td>C101</td>
                <td>Ravi</td>
                <td>9876543210</td>

                <td class="paid">
                    Paid
                </td>

                <td>
                    <button class="delete-btn"
                            onclick="deleteClient(this)">
                        Delete
                    </button>
                </td>

            </tr>

            <tr>

                <td>C102</td>
                <td>Kiran</td>
                <td>9123456780</td>

                <td class="not-paid">
                    Not Paid
                </td>

                <td>
                    <button class="delete-btn"
                            onclick="deleteClient(this)">
                        Delete
                    </button>
                </td>

            </tr>

        </table>

    </div>

    <!-- Popup -->

    <div class="popup" id="popupForm">

        <h2 style="margin-bottom:20px;">
            Add Client
        </h2>

        <input type="text"
               id="clientId"
               placeholder="Client ID">

        <input type="text"
               id="clientName"
               placeholder="Client Name">

        <input type="text"
               id="mobile"
               placeholder="Mobile Number">

        <select id="status">

            <option value="Paid">
                Paid
            </option>

            <option value="Not Paid">
                Not Paid
            </option>

        </select>

        <button class="save-btn"
                onclick="addClient()">

            Save Client

        </button>

    </div>

    <script>

        function openPopup(){

            document.getElementById("popupForm").style.display="block";
        }

        function addClient(){

            let id=document.getElementById("clientId").value;
            let name=document.getElementById("clientName").value;
            let mobile=document.getElementById("mobile").value;
            let status=document.getElementById("status").value;

            let table=document.getElementById("clientTable");

            let row=table.insertRow();

            let statusClass=
            status=="Paid"
            ? "paid"
            : "not-paid";

            row.innerHTML=
            `
            <td>${id}</td>

            <td>${name}</td>

            <td>${mobile}</td>

            <td class="${statusClass}">
                ${status}
            </td>

            <td>
                <button class="delete-btn"
                        onclick="deleteClient(this)">
                    Delete
                </button>
            </td>
            `;

            document.getElementById("popupForm").style.display="none";
        }

        function deleteClient(button){

            let row=button.parentNode.parentNode;

            row.remove();
        }

    </script>

</body>

</html>
