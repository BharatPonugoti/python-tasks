<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Information</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #7c3aed
            );

            min-height:100vh;

            padding:40px;

            color:white;
        }

        .container{

            background:rgba(255,255,255,0.1);

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:
            0 0 20px rgba(0,0,0,0.4);
        }

        h1{

            margin-bottom:30px;

            font-size:45px;

            text-align:center;
        }

        .top-section{

            display:flex;

            justify-content:space-between;

            margin-bottom:30px;
        }

        .add-btn{

            padding:12px 25px;

            border:none;

            border-radius:10px;

            background:#22c55e;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        .add-btn:hover{

            transform:scale(1.05);

            background:#16a34a;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:15px;
        }

        th{

            background:#2563eb;

            padding:15px;

            font-size:18px;
        }

        td{

            background:rgba(255,255,255,0.1);

            padding:15px;

            text-align:center;

            font-size:17px;
        }

        tr:hover td{

            background:rgba(255,255,255,0.2);
        }

        .delete-btn{

            padding:8px 15px;

            border:none;

            border-radius:8px;

            background:#ef4444;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .delete-btn:hover{

            background:#dc2626;

            transform:scale(1.05);
        }

        .form-popup{

            display:none;

            position:fixed;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            background:white;

            color:black;

            padding:30px;

            border-radius:20px;

            width:350px;

            box-shadow:
            0 0 20px rgba(0,0,0,0.5);
        }

        .form-popup input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:1px solid gray;

            border-radius:8px;
        }

        .save-btn{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>📚 Books Information</h1>

        <div class="top-section">

            <button class="add-btn"
                    onclick="openForm()">

                ➕ Add Book

            </button>

        </div>

        <table id="bookTable">

            <tr>

                <th>ID</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Edition</th>
                <th>Action</th>

            </tr>

            <tr>

                <td>101</td>
                <td>Python Basics</td>
                <td>John</td>
                <td>2nd</td>

                <td>
                    <button class="delete-btn"
                            onclick="deleteRow(this)">
                        Delete
                    </button>
                </td>

            </tr>

            <tr>

                <td>102</td>
                <td>DBMS</td>
                <td>Kumar</td>
                <td>5th</td>

                <td>
                    <button class="delete-btn"
                            onclick="deleteRow(this)">
                        Delete
                    </button>
                </td>

            </tr>

        </table>

    </div>

    <!-- Add Book Popup -->

    <div class="form-popup" id="popupForm">

        <h2 style="margin-bottom:20px;">
            Add New Book
        </h2>

        <input type="text"
               id="bookId"
               placeholder="Book ID">

        <input type="text"
               id="bookName"
               placeholder="Book Name">

        <input type="text"
               id="author"
               placeholder="Author">

        <input type="text"
               id="edition"
               placeholder="Edition">

        <button class="save-btn"
                onclick="addBook()">

            Save Book

        </button>

    </div>

    <script>

        function openForm(){

            document.getElementById("popupForm").style.display="block";
        }

        function addBook(){

            let id=document.getElementById("bookId").value;
            let name=document.getElementById("bookName").value;
            let author=document.getElementById("author").value;
            let edition=document.getElementById("edition").value;

            let table=document.getElementById("bookTable");

            let row=table.insertRow();

            row.innerHTML=
            `
            <td>${id}</td>
            <td>${name}</td>
            <td>${author}</td>
            <td>${edition}</td>

            <td>
                <button class="delete-btn"
                        onclick="deleteRow(this)">
                    Delete
                </button>
            </td>
            `;

            document.getElementById("popupForm").style.display="none";
        }

        function deleteRow(button){

            let row=button.parentNode.parentNode;

            row.remove();
        }

    </script>

</body>

</html>
